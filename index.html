<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
    <h2>Admin Panel</h2>
    <ul>
        <li>Dashboard</li>
        <li>Users</li>
        <li>Orders</li>
        <li>Products</li>
        <li>Settings</li>
    </ul>
</div>

<div class="main">
    <header>
        <h1>Dashboard</h1>
    </header>

    <div class="cards">
        <div class="card">
            <h3>Users</h3>
            <p id="users">125</p>
        </div>

        <div class="card">
            <h3>Orders</h3>
            <p id="orders">58</p>
        </div>

        <div class="card">
            <h3>Revenue</h3>
            <p>$12,450</p>
        </div>
    </div>

    <button onclick="addUser()">Add User</button>
</div>

<script src="script.js"></script>
</body>
</html>
